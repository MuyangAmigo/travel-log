<!DOCTYPE html>
<html class="staticrypt-html" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>/*[|template_title|]*/0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
      :root {
        --red: #ff2442;
        --red-dark: #d90f2f;
        --ink: #1f1f1f;
        --muted: #767676;
        --paper: #fffaf3;
        --line: rgba(31, 31, 31, 0.1);
        --shadow: 0 24px 70px rgba(51, 22, 12, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      .hidden {
        display: none !important;
      }

      .staticrypt-html,
      .staticrypt-body,
      .staticrypt-content {
        min-height: 100%;
      }

      .staticrypt-body {
        margin: 0;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
        color: var(--ink);
        background: #f5f5f0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .staticrypt-content {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        place-items: center;
        overflow: hidden;
        padding: 32px 18px;
        background:
          radial-gradient(circle at 15% 18%, rgba(255, 36, 66, 0.18), transparent 28%),
          radial-gradient(circle at 86% 78%, rgba(255, 193, 7, 0.16), transparent 30%),
          linear-gradient(135deg, #fff8ef 0%, #f5f5f0 44%, #f7ede8 100%);
      }

      .staticrypt-content::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(31, 31, 31, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(31, 31, 31, 0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at center, #000 0%, transparent 78%);
      }

      .staticrypt-content::after {
        content: "PRIVATE ENTRY";
        position: absolute;
        right: clamp(-92px, -5vw, -38px);
        top: clamp(72px, 10vw, 140px);
        padding: 10px 28px;
        border: 2px solid rgba(255, 36, 66, 0.25);
        border-radius: 999px;
        color: rgba(255, 36, 66, 0.28);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.28em;
        transform: rotate(18deg);
      }

      .staticrypt-spinner-container {
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #f5f5f0;
      }

      .staticrypt-spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(255, 36, 66, 0.18);
        border-top-color: var(--red);
        border-radius: 999px;
        animation: spinner-border 0.8s linear infinite;
      }

      @keyframes spinner-border {
        to {
          transform: rotate(360deg);
        }
      }

      .staticrypt-page {
        position: relative;
        z-index: 1;
        width: min(100%, 860px);
      }

      .staticrypt-form {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(320px, 0.8fr);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.85);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .travel-panel {
        position: relative;
        min-height: 520px;
        padding: 42px;
        color: #ffffff;
        background:
          linear-gradient(to top, rgba(0, 0, 0, 0.74), rgba(0, 0, 0, 0.08) 64%),
          radial-gradient(circle at 70% 18%, rgba(255, 36, 66, 0.78), transparent 32%),
          radial-gradient(circle at 22% 18%, rgba(255, 190, 89, 0.44), transparent 28%),
          linear-gradient(135deg, #1f1f1f 0%, #392c28 55%, #131313 100%);
      }

      .travel-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.065) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
        background-size: 38px 38px;
        mask-image: linear-gradient(to bottom, transparent, #000 20%, #000 100%);
      }

      .brand-row,
      .panel-copy,
      .ticket-stub {
        position: relative;
        z-index: 1;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: var(--red);
        font-size: 23px;
        box-shadow: 0 12px 32px rgba(255, 36, 66, 0.36);
      }

      .brand-text {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.78);
      }

      .panel-copy {
        margin-top: 128px;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        margin-bottom: 18px;
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(255, 36, 66, 0.92);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      .panel-title {
        max-width: 420px;
        margin: 0;
        font-size: clamp(42px, 5vw, 64px);
        line-height: 1.06;
        letter-spacing: -0.04em;
        text-shadow: 0 3px 24px rgba(0, 0, 0, 0.28);
      }

      .panel-subtitle {
        max-width: 380px;
        margin: 18px 0 0;
        color: rgba(255, 255, 255, 0.8);
        font-size: 16px;
        line-height: 1.7;
      }

      .ticket-stub {
        position: absolute;
        left: 42px;
        right: 42px;
        bottom: 34px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
        padding-top: 18px;
        border-top: 1px dashed rgba(255, 255, 255, 0.34);
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .ticket-code {
        font-weight: 800;
        color: #ffffff;
      }

      .form-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 46px 42px;
        background: rgba(255, 255, 255, 0.92);
      }

      .staticrypt-instructions {
        margin-bottom: 28px;
      }

      .staticrypt-title {
        margin: 0 0 10px;
        font-size: 28px;
        font-weight: 850;
        letter-spacing: -0.04em;
      }

      .staticrypt-instructions p:last-child {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.75;
      }

      .field-label {
        display: block;
        margin-bottom: 9px;
        color: #4b4b4b;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .staticrypt-password-container {
        position: relative;
        margin-bottom: 14px;
      }

      .staticrypt-form input[type="password"],
      .staticrypt-form input[type="text"] {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 18px;
        outline: 0;
        background: #fffaf7;
        color: var(--ink);
        padding: 16px 52px 16px 18px;
        font: inherit;
        font-size: 16px;
        transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
      }

      .staticrypt-form input[type="password"]:focus,
      .staticrypt-form input[type="text"]:focus {
        border-color: rgba(255, 36, 66, 0.64);
        background: #ffffff;
        box-shadow: 0 0 0 5px rgba(255, 36, 66, 0.12);
      }

      .staticrypt-toggle-password-visibility {
        position: absolute;
        right: 14px;
        top: 50%;
        width: 22px;
        height: 22px;
        padding: 0;
        opacity: 0.55;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .staticrypt-form .staticrypt-decrypt-button {
        width: 100%;
        min-height: 58px;
        margin-top: 6px;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--red), var(--red-dark));
        color: #ffffff;
        font-size: 15px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 16px 34px rgba(255, 36, 66, 0.24);
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .staticrypt-form .staticrypt-decrypt-button:hover,
      .staticrypt-form .staticrypt-decrypt-button:focus {
        filter: brightness(1.02);
        box-shadow: 0 18px 42px rgba(255, 36, 66, 0.32);
        transform: translateY(-1px);
      }

      .staticrypt-form .staticrypt-decrypt-button:active {
        transform: translateY(1px);
      }

      label.staticrypt-remember {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .staticrypt-remember input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--red);
      }

      .fine-print {
        margin-top: 18px;
        color: #9a8f89;
        font-size: 12px;
        line-height: 1.6;
      }

      @media (max-width: 760px) {
        .staticrypt-content {
          align-items: start;
          padding: 14px;
        }

        .staticrypt-form {
          grid-template-columns: 1fr;
          border-radius: 28px;
        }

        .travel-panel {
          min-height: 330px;
          padding: 28px 24px;
        }

        .panel-copy {
          margin-top: 72px;
        }

        .panel-title {
          font-size: 40px;
        }

        .panel-subtitle {
          font-size: 14px;
        }

        .ticket-stub {
          left: 24px;
          right: 24px;
          bottom: 22px;
        }

        .form-panel {
          padding: 28px 22px 24px;
        }

        .staticrypt-title {
          font-size: 24px;
        }
      }
    </style>
  </head>

  <body class="staticrypt-body">

        </section>
      </div>
    </main>

        rememberExpirationKey: "staticrypt_expiration",
        rememberPassphraseKey: "staticrypt_passphrase",

      const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

      window.onload = async function () {

        if (!isSuccessful) {
          document.getElementById("staticrypt_loading").classList.add("hidden");

          passwordInput.type = "text";

          toggleIcon.alt = templateToggleAltHide;
          toggleIcon.title = templateToggleAltHide;

          toggleIcon.src = imgSrcEyeClosed;

        const password = document.getElementById("staticrypt-password").value;
        const isRememberChecked = false;

        const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
